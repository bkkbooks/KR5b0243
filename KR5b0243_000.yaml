front:
  text: 慈尊升度寶懴
  hash: sha256:67b43f81b67f9310cb5e27acb86f48f332a4a7124c47f24fbc12c94b3533d379
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0243_HFL_000-001a, image: hfl/0296/0296-082.png}
body:
  text: 法事如式具位臣某焚香奏啓至真無上道寶太上三尊至真無上經寶三十六部尊經至真無上師寶玄中大法師東極宫中大慈仁者太一救苦天尊青玄上帝九幽拔罪天尊十方救苦天尊大慈大悲救苦真人大慈大悲大惠真人救苦會中無鞅真宰傅奏香官功曹使者此間土地里域正神悉仗真香普同供養臣今奏為臣聞三清上聖布三洞以垂慈十極天尊遍十方而救苦恩覃宇宙惠及幽冥六趣衆生披雲霧而行瞻日月九幽諸地化沙塵而載度天人而況黃籙垂科紫清設教普資普度無量無邊今者奉為亡過某靈魂依九品之真科禱十天之列聖祗嚴淨宇虔露哀忱懴塵劫之愆尤解多生之罪障今則蘭場式備寶炷凝煙恭對至尊宣揚懴法稽首皈依無極大道啓敬贊三皈依三寶既皈十方洞鑒以今奉為亡過某靈魂仰奉真科輒憑道侣用資冥福超度往生嚴潔香花虔誠供養道場衆等切以香者騫林奇木聚窟靈根發揚道德之輝華固結乾坤之瑞氣寶奩才出金鼎初梵願慈一瓣之香遍御十華之境法衆虔誠皈依供養浮香遠覽天尊沈壇百和藹祥雲一瓣心香表至誠救苦天尊垂降格亡靈得度禮三清切以花者閬苑傳根靈臺結蘂發五枝之仙桂開十丈之芳蓮繽紛落座隅綽約縈空際嚴持萬𠦄散漫十方法衆皈依虔誠供養寶花嚴淨天尊天香國色自長春燦爛盈盤表至誠三境天尊垂證鑒亡靈得度禮慈尊切以水者淵源甚摶利濟無窮挹從東井之中酌向十方之境備雖簡易貴在虔恭法衆皈依虔誠供養甘露流通天尊沈沈玉海注靈波渺渺泓澄潤澤多十極天尊垂證鑒恩霑亡者順離羅伏聞救苦天尊遍滿十方界常以威神力救拔諸衆生得離於迷途衆生不知覺如盲見日月我本太無中拔領無邊際慶雲開生門祥煙塞死户初發玄元始以通祥感機救一切罪度一切厄渺渺超仙源蕩蕩自然清如斯道力無量無邊今者仰對寶光禮瞻玉相奉為亡過某靈魂懴生前之罪咎除殁後之愆尤法衆虔誠至心朝禮至心朝禮大羅元始天尊至心朝禮玉宸靈寶天尊至心朝禮混元道德天尊至心朝禮太一救苦天尊至心朝禮九幽拔罪天尊至心朝禮玉寶皇上天尊至心朝禮玄真萬福天尊至心朝禮太妙至極天尊至心朝禮玄上玉宸天尊至心朝禮度仙上聖天尊至心朝禮好生度命天尊至心朝禮太靈虛皇天尊至心朝禮無量太華天尊至心朝禮玉虛明皇天尊至心朝禮真皇洞神天尊至心朝禮大慈大悲救苦真人至心朝禮大慈大悲大惠真人禮足各長跪皈命懴悔臣法衆等至心皈身皈神皈命三清上聖十方救苦天尊恭望大慈洞垂巨澤俯降洪恩以今行道朝元焚香謝過懴悔所薦亡過某靈魂自從生誕乃至淪亡舉止去來滯染六根之塵垢虛華逸樂滋生萬種之愆喜捨身受身無邊無量一切身業重罪願賜赦除伏願三寶垂慈十方救苦頒金書而赦罪承惠澤以遷神臣等至心稽首禮謝無上虛皇至真三寶步虛臣等又慮亡過某靈魂身業巳斷心業未消更為重啓十方告盟衆聖懴生前之罪咎證今日之良因法衆皈依再伸朝禮至心朝禮大羅元始天尊至心朝禮玉宸靈寶天尊至心朝禮混元道德天尊至心朝禮太一救苦天尊至心朝禮九幽拔罪天尊至心朝禮玉寶皇上天尊至心朝禮玄真萬福天尊至心朝禮太妙至極天尊至心朝禮玄上玉宸天尊至心朝禮度仙上聖天尊至心朝禮好生度命天尊至心朝禮太靈虛皇天尊至心朝禮無量太華天尊至心朝禮玉虛明皇天尊至心朝禮真皇洞神天尊至心朝禮大慈大悲救苦真人至心朝禮大慈大悲大惠真人禮足各長跪皈命懴悔臣法衆等至心皈身皈神皈命三清上聖十方救苦天尊恭望大慈洞垂巨澤俯降洪恩以今行道朝元焚香謝過懴悔所薦亡過某靈魂自從生誕乃至淪亡嗔喜愛憎種禮悉從於心起貪欲虛妄念念皆屬於意萌故犯悮為無邊無量一切心業諸罪願賜赦除伏願慈恩廣布於十方罪根消滅淨魂早離於九地福境逍遙臣等至心稽首禮謝無上正真三寶步虛臣等又慮亡過某心業既得以消除頓回正念口業不經於懴悔難斷惡根更為重啓十方併除三業俾所薦亡過某靈魂悟身心口業之幻妄罪垢冰消禮道經師寶之真乘善芽增長法衆皈依三伸朝禮至心朝禮大羅元始天尊至心朝禮玉宸靈寶天尊至心朝禮混元道德天尊至心朝禮太一救苦天尊至心朝禮九幽拔罪天尊至心朝禮玉寶皇上天尊至心朝禮玄真萬福天尊至心朝禮太妙至極天尊至心朝禮玄上玉宸天尊至心朝禮度仙上聖天尊至心朝禮好生度命天尊至心朝禮太靈虛皇天尊至心朝禮無量太華天尊至心朝禮玉虛明皇天尊至心朝禮真皇洞神天尊至心朝禮大慈大悲救苦真人至心朝禮大慈大悲大惠真人禮足各長跪皈命懴悔臣法衆等至心皈身皈神皈命三清上聖十方救苦天尊恭望大慈洞垂巨澤俯降洪恩以今行道朝元焚香謝過懴悔所薦亡過某靈魂自從生誕乃至淪亡口是心非恣啖傷於物命華言綺語騁巧侫於舌根自作教他無邊無量一切口業大罪願賜赦除伏願三業蠲消六根清淨悉仗十天之聖力永離九夜之昏途臣等至心稽首禮謝無上正真三寶步虛三啓三禮仰惟十方救苦天尊化形十方界普濟度天人委氣聚功德同聲救罪魂過此境界東極天中長樂舍內大慈仁者救苦天尊發弘誓願普救衆生億億劫中度人無量若能稱揚寶號注想慈容皈心不暫停念誦無休息即得離諸苦趣證此勝緣享大福於天堂無苦聲於地獄火翳成清署劔樹化騫林上登朱陵府徑朝元始尊更憑道侣同為稱揚舉青華寶號己聞寶號注想尊容功德巍巍除殃滅罪更憑道力經力資冥福以超升惟仗妙音法音覺魂儀而解悟真經有妙祕典重宣法衆皈依至心持誦救苦妙經今者瓊札琅書聲聞十極玉音寶號響徹諸天當願侍香金童結香篆於天中典經玉郎進經文於簡上即使罪消億劫福降今辰存亡承開泰之恩動植感生成之德如斯勝力遍悉裝嚴三途罷楚毒之勞九夜絶辛酸之苦洎乎愆悠庶品蠢蠢含生俱登六度之舟並上三清之界臣等至心稽首禮謝無上虛皇正真三寶向來回向慈尊升度寶懴
